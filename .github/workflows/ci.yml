name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        run: |
          echo "# 🏗️ Build-Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Commit:** \`${GITHUB_SHA::7}\` auf \`${GITHUB_REF_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          BUILD_START=$SECONDS
          if npm run build 2>&1 | tee /tmp/build.log; then
            BUILD_DUR=$((SECONDS - BUILD_START))
            STATIC=$(grep -c "○" /tmp/build.log || true)
            DYNAMIC=$(grep -c "ƒ" /tmp/build.log || true)
            SSR=$(grep -c "λ" /tmp/build.log || true)
            TOTAL=$((STATIC + DYNAMIC + SSR))
            BUNDLE_SIZE=$(grep "First Load JS" /tmp/build.log | head -1 | grep -oP '[\d.]+ [kM]B' || echo "–")
            echo "| Metrik | Wert |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Ergebnis | ✅ Build erfolgreich |" >> $GITHUB_STEP_SUMMARY
            echo "| Dauer | ${BUILD_DUR}s |" >> $GITHUB_STEP_SUMMARY
            echo "| Seiten gesamt | ${TOTAL} |" >> $GITHUB_STEP_SUMMARY
            echo "| Statische Seiten | ${STATIC} |" >> $GITHUB_STEP_SUMMARY
            echo "| Dynamische Seiten | ${DYNAMIC} |" >> $GITHUB_STEP_SUMMARY
            echo "| First Load JS | ${BUNDLE_SIZE} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Build-Output anzeigen</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -A 100 "Route (app)" /tmp/build.log | head -40 >> $GITHUB_STEP_SUMMARY || tail -30 /tmp/build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            BUILD_DUR=$((SECONDS - BUILD_START))
            echo "| Metrik | Wert |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Ergebnis | ❌ Build fehlgeschlagen |" >> $GITHUB_STEP_SUMMARY
            echo "| Dauer | ${BUILD_DUR}s |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Fehlerdetails anzeigen</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -40 /tmp/build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
