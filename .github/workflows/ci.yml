name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: TypeCheck, Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Check
        id: typecheck
        run: |
          echo "# 🔍 Validierungsreport — Node ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Commit:** \`${GITHUB_SHA::7}\` auf \`${GITHUB_REF_NAME}\` • **Ausgelöst von:** ${GITHUB_ACTOR}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 1️⃣ TypeScript-Prüfung" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TS_START=$SECONDS
          if npm run typecheck 2>&1 | tee /tmp/typecheck.log; then
            TS_DUR=$((SECONDS - TS_START))
            TS_FILES=$(find src -name '*.ts' -o -name '*.tsx' | wc -l)
            echo "| Metrik | Wert |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Ergebnis | ✅ Bestanden |" >> $GITHUB_STEP_SUMMARY
            echo "| Geprüfte Dateien | ${TS_FILES} TypeScript-Dateien |" >> $GITHUB_STEP_SUMMARY
            echo "| Strict Mode | Aktiviert |" >> $GITHUB_STEP_SUMMARY
            echo "| Dauer | ${TS_DUR}s |" >> $GITHUB_STEP_SUMMARY
          else
            TS_DUR=$((SECONDS - TS_START))
            ERRORS=$(grep -c "error TS" /tmp/typecheck.log || echo "?")
            echo "| Metrik | Wert |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Ergebnis | ❌ Fehlgeschlagen |" >> $GITHUB_STEP_SUMMARY
            echo "| Anzahl Fehler | ${ERRORS} |" >> $GITHUB_STEP_SUMMARY
            echo "| Dauer | ${TS_DUR}s |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Fehlerdetails anzeigen</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/typecheck.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Lint
        id: lint
        run: |
          echo "## 2️⃣ ESLint-Prüfung" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          LINT_START=$SECONDS
          if npm run lint 2>&1 | tee /tmp/lint.log; then
            LINT_DUR=$((SECONDS - LINT_START))
            echo "| Metrik | Wert |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Ergebnis | ✅ Bestanden |" >> $GITHUB_STEP_SUMMARY
            echo "| Regelwerk | next/core-web-vitals |" >> $GITHUB_STEP_SUMMARY
            echo "| Warnungen | 0 |" >> $GITHUB_STEP_SUMMARY
            echo "| Fehler | 0 |" >> $GITHUB_STEP_SUMMARY
            echo "| Dauer | ${LINT_DUR}s |" >> $GITHUB_STEP_SUMMARY
          else
            LINT_DUR=$((SECONDS - LINT_START))
            LINT_ERRORS=$(grep -c "Error:" /tmp/lint.log || echo "?")
            LINT_WARNINGS=$(grep -c "Warning:" /tmp/lint.log || echo "0")
            echo "| Metrik | Wert |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Ergebnis | ❌ Fehlgeschlagen |" >> $GITHUB_STEP_SUMMARY
            echo "| Fehler | ${LINT_ERRORS} |" >> $GITHUB_STEP_SUMMARY
            echo "| Warnungen | ${LINT_WARNINGS} |" >> $GITHUB_STEP_SUMMARY
            echo "| Dauer | ${LINT_DUR}s |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Lint-Fehler anzeigen</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/lint.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Run Tests
        id: tests
        run: |
          mkdir -p test-results
          npm run test:ci 2>&1 | tee /tmp/test.log
          TEST_EXIT=${PIPESTATUS[0]}
          echo "## 3️⃣ Testergebnisse" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results/results.json ]; then
            node scripts/ci-report.mjs test-results/results.json "Node ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Keine JSON-Ergebnisse verfügbar" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/test.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Coverage-Zusammenfassung
          echo "## 4️⃣ Code-Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json','utf-8')).total;
              const fmt = (v) => v.pct + '%';
              const icon = (v, t) => v.pct >= t ? '✅' : '⚠️';
              console.log('| Metrik | Abdeckung | Schwelle | Status |');
              console.log('|---|---|---|---|');
              console.log('| Statements | ' + fmt(c.statements) + ' | 80% | ' + icon(c.statements, 80) + ' |');
              console.log('| Branches | ' + fmt(c.branches) + ' | 70% | ' + icon(c.branches, 70) + ' |');
              console.log('| Functions | ' + fmt(c.functions) + ' | 80% | ' + icon(c.functions, 80) + ' |');
              console.log('| Lines | ' + fmt(c.lines) + ' | 80% | ' + icon(c.lines, 80) + ' |');
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Kein Coverage-Report generiert" >> $GITHUB_STEP_SUMMARY
          fi

          exit $TEST_EXIT

      - name: Vitest Coverage Report
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          vite-config-path: vitest.config.ts

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-node-${{ matrix.node-version }}
          path: |
            test-results/junit.xml
            test-results/results.json
            coverage/coverage-summary.json
          retention-days: 30

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        run: |
          echo "# 🏗️ Build-Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Commit:** \`${GITHUB_SHA::7}\` auf \`${GITHUB_REF_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          BUILD_START=$SECONDS
          if npm run build 2>&1 | tee /tmp/build.log; then
            BUILD_DUR=$((SECONDS - BUILD_START))
            STATIC=$(grep -c "○" /tmp/build.log || true)
            DYNAMIC=$(grep -c "ƒ" /tmp/build.log || true)
            SSR=$(grep -c "λ" /tmp/build.log || true)
            TOTAL=$((STATIC + DYNAMIC + SSR))
            BUNDLE_SIZE=$(grep "First Load JS" /tmp/build.log | head -1 | grep -oP '[\d.]+ [kM]B' || echo "–")
            echo "| Metrik | Wert |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Ergebnis | ✅ Build erfolgreich |" >> $GITHUB_STEP_SUMMARY
            echo "| Dauer | ${BUILD_DUR}s |" >> $GITHUB_STEP_SUMMARY
            echo "| Seiten gesamt | ${TOTAL} |" >> $GITHUB_STEP_SUMMARY
            echo "| Statische Seiten | ${STATIC} |" >> $GITHUB_STEP_SUMMARY
            echo "| Dynamische Seiten | ${DYNAMIC} |" >> $GITHUB_STEP_SUMMARY
            echo "| First Load JS | ${BUNDLE_SIZE} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Build-Output anzeigen</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -A 100 "Route (app)" /tmp/build.log | head -40 >> $GITHUB_STEP_SUMMARY || tail -30 /tmp/build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            BUILD_DUR=$((SECONDS - BUILD_START))
            echo "| Metrik | Wert |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Ergebnis | ❌ Build fehlgeschlagen |" >> $GITHUB_STEP_SUMMARY
            echo "| Dauer | ${BUILD_DUR}s |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Fehlerdetails anzeigen</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -40 /tmp/build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key
