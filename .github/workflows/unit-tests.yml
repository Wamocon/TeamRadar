name: Unit Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  unit-tests:
    name: Unit Tests — Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        id: tests
        run: |
          mkdir -p test-results
          npm run test:ci 2>&1 | tee /tmp/test.log
          TEST_EXIT=${PIPESTATUS[0]}
          echo "# 🧪 Test-Report — Node ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Commit:** \`${GITHUB_SHA::7}\` auf \`${GITHUB_REF_NAME}\` • **Ausgelöst von:** ${GITHUB_ACTOR}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Testergebnisse" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results/results.json ]; then
            node scripts/ci-report.mjs test-results/results.json "Node ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Keine JSON-Ergebnisse verfügbar" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/test.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Code-Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json','utf-8')).total;
              const fmt = (v) => v.pct + '%';
              const icon = (v, t) => v.pct >= t ? '✅' : '⚠️';
              console.log('| Metrik | Abdeckung | Schwelle | Status |');
              console.log('|---|---|---|---|');
              console.log('| Statements | ' + fmt(c.statements) + ' | 90% | ' + icon(c.statements, 90) + ' |');
              console.log('| Branches | ' + fmt(c.branches) + ' | 90% | ' + icon(c.branches, 90) + ' |');
              console.log('| Functions | ' + fmt(c.functions) + ' | 90% | ' + icon(c.functions, 90) + ' |');
              console.log('| Lines | ' + fmt(c.lines) + ' | 90% | ' + icon(c.lines, 90) + ' |');
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Kein Coverage-Report generiert" >> $GITHUB_STEP_SUMMARY
          fi

          exit $TEST_EXIT
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: Vitest Coverage Report
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          vite-config-path: vitest.config.ts

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-node-${{ matrix.node-version }}
          path: |
            test-results/junit.xml
            test-results/results.json
            coverage/coverage-summary.json
          retention-days: 30
